<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini</title>
    <!-- Google Fonts for Gemini Aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-theme">
    <div class="app-container">
        <!-- Collapsible Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-header-row">
                    <button class="icon-btn menu-toggle" id="menuToggleBtn">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                        </svg>
                    </button>
                    <div class="gemini-brand">
                        <img src="gemini-logo.png" alt="Gemini" class="gemini-brand-logo">
                        <span class="gemini-brand-title">Gemini</span>
                    </div>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" class="plus-icon">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    <span class="btn-text">New chat</span>
                </button>
            </div>

            <div class="sidebar-mid">
                <div class="section-title">Recent</div>
                <div class="recent-list">
                    <div class="recent-item" onclick="prefillAndSend('Why is my code working?')">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/>
                        </svg>
                        <span class="recent-text">Why is my code working?</span>
                    </div>
                    <div class="recent-item" onclick="prefillAndSend('How to bribe my cat')">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/>
                        </svg>
                        <span class="recent-text">How to bribe my cat</span>
                    </div>
                    <div class="recent-item" onclick="prefillAndSend('Can I pay my mortgage in Monopoly money?')">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/>
                        </svg>
                        <span class="recent-text">Mortgage in Monopoly money?</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-bottom">
                <div class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
                    </svg>
                    <span>Help</span>
                </div>
                <div class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                    </svg>
                    <span>Activity</span>
                </div>
                <div class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                    </svg>
                    <span>Settings</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Panel -->
        <main class="main-content welcome-state">
            <header class="header">
                <div class="header-left">
                    <button class="icon-btn menu-toggle-main" id="menuToggleMainBtn">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                        </svg>
                    </button>
                </div>
                <div class="header-right">
                    <div class="user-avatar-btn">
                        <div class="avatar-letter">E</div>
                    </div>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <!-- Welcome/Landing Screen (shows initially) -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-header animate-gradient-text">
                        <h1>Hello, Erik</h1>
                    </div>
                    <div class="welcome-sub">
                        <h2>How can I help you today?</h2>
                    </div>
                </div>

                <!-- Chat History Feed (hidden initially, shown when message sent) -->
                <div class="chat-feed" id="chatFeed" style="display: none;">
                    <!-- Message list populated dynamically -->
                </div>
            </div>

            <!-- Chat Footer Input Area -->
            <footer class="footer-input-area">
                <div class="input-box-wrapper">
                    <div class="input-box-container">
                        <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask Gemini..."></textarea>
                        <div class="input-right-buttons">

                            <button class="send-btn" id="sendBtn" disabled>
                                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <!-- Background dynamic glow effects (reproducing gemini's aurora style) -->
    <div class="aurora-glow-container">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
    </div>

    <script src="demo.js"></script>
</body>
</html>
